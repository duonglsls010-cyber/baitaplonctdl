<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phần Mềm Quản Lý Kho Dược Phẩm</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <h2 class="main-title mb-1">Med<span class="text-gradient">Dashboard</span></h2>
            <p class="text-gray fw-medium mb-0">Hệ thống quản lý dược phẩm thông minh</p>
        </div>
        <div class="text-end d-none d-md-block">
            <p class="mb-0 text-gray fw-bold"><i class="fa-regular fa-calendar me-2"></i>Hôm nay</p>
            <h5 class="fw-bold text-dark" id="currentDate">--/--/----</h5>
        </div>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-md-6">
            <div class="glass-card d-flex align-items-center gap-4 py-3">
                <div class="icon-box bg-primary-light"><i class="fa-solid fa-capsules"></i></div>
                <div>
                    <p class="text-gray fw-bold mb-1">Tổng Số Loại Thuốc</p>
                    <h2 class="mb-0 fw-black text-dark" id="tongLoaiThuoc">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="glass-card d-flex align-items-center gap-4 py-3">
                <div class="icon-box bg-success-light"><i class="fa-solid fa-sack-dollar"></i></div>
                <div>
                    <p class="text-gray fw-bold mb-1">Ước Tính Tổng Trị Giá Kho</p>
                    <h2 class="mb-0 fw-black text-dark" id="tongGiaTri">0 đ</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-xl-4 col-lg-5">
            <div class="glass-card">
                <h5 class="fw-bold mb-4 text-dark"><i class="fa-solid fa-plus-circle text-primary me-2"></i>Thêm Mới Thuốc</h5>
                <form id="formThuoc">
                    <div class="mb-3">
                        <label class="form-label">Mã định danh (ID)</label>
                        <input type="text" id="maThuoc" class="form-control" placeholder="Ví dụ: T001" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tên dược phẩm</label>
                        <input type="text" id="tenThuoc" class="form-control" placeholder="Tên thuốc..." required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nhà sản xuất</label>
                        <input type="text" id="nhaSX" class="form-control" placeholder="Hãng sản xuất..." required>
                    </div>
                    <div class="row mb-4">
                        <div class="col-6">
                            <label class="form-label">Số lượng</label>
                            <input type="number" id="soLuong" class="form-control" placeholder="0" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label">Giá bán (VNĐ)</label>
                            <input type="number" id="giaBan" class="form-control" placeholder="0" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-action btn-add w-100">
                        <i class="fa-solid fa-cloud-arrow-up"></i> Lưu Dữ Liệu
                    </button>
                </form>
            </div>
        </div>

        <div class="col-xl-8 col-lg-7">
            <div class="glass-card">
                <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
                    <div class="input-group" style="max-width: 320px;">
                        <span class="input-group-text bg-white border-0"><i class="fa-solid fa-magnifying-glass text-gray"></i></span>
                        <input type="text" id="inputSearch" class="form-control border-0 bg-secondary" placeholder="Tìm kiếm dược phẩm...">
                        <button class="btn btn-primary px-3 fw-bold rounded-end" onclick="timKiemThuoc()" type="button">Tìm</button>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-outline-primary fw-bold btn-action py-2" onclick="sapXepGia()">
                            <i class="fa-solid fa-arrow-down-short-wide"></i> Giá Tăng Dần
                        </button>
                        <button class="btn btn-light border fw-bold btn-action py-2" onclick="taiLaiDanhSach()">
                            <i class="fa-solid fa-rotate-right"></i>
                        </button>
                    </div>
                </div>

                <div class="table-container">
                    <table class="table text-center align-middle">
                        <thead>
                            <tr>
                                <th width="15%">Mã ID</th>
                                <th width="30%" class="text-start">Tên Sản Phẩm</th>
                                <th width="20%">Hãng SX</th>
                                <th width="10%">Tồn</th>
                                <th width="25%">Giá Bán</th>
                            </tr>
                        </thead>
                        <tbody id="bangThuoc">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Lấy ngày hiện tại
    const date = new Date();
    document.getElementById('currentDate').innerText = date.toLocaleDateString('vi-VN');

    // Hàm render bảng và CẬP NHẬT THỐNG KÊ
    function hienThiBang(danhSach) {
        const tbody = document.getElementById('bangThuoc');
        tbody.innerHTML = '';
        
        let tongTien = 0; // Biến tính tổng tiền
        
        danhSach.forEach(thuoc => {
            // Cộng dồn tiền kho
            tongTien += (thuoc.soLuong * thuoc.giaBan);

            const tr = `<tr>
                <td><span class="text-primary fw-bold">#${thuoc.maThuoc}</span></td>
                <td class="text-start text-dark fw-bold">${thuoc.tenThuoc}</td>
                <td class="text-gray fw-medium">${thuoc.nhaSX}</td>
                <td><span class="badge-stock">${thuoc.soLuong}</span></td>
                <td><span class="price-tag">${thuoc.giaBan.toLocaleString('vi-VN')} đ</span></td>
            </tr>`;
            tbody.innerHTML += tr;
        });

        // Cập nhật lên Widgets
        document.getElementById('tongLoaiThuoc').innerText = danhSach.length;
        document.getElementById('tongGiaTri').innerText = tongTien.toLocaleString('vi-VN') + " đ";
    }

    function taiLaiDanhSach() {
        fetch('/api/thuoc').then(res => res.json()).then(data => hienThiBang(data));
        document.getElementById('inputSearch').value = '';
    }

    // Thêm thuốc dùng SweetAlert2
    document.getElementById('formThuoc').addEventListener('submit', function(e) {
        e.preventDefault();
        const thuocMoi = {
            maThuoc: document.getElementById('maThuoc').value,
            tenThuoc: document.getElementById('tenThuoc').value,
            nhaSX: document.getElementById('nhaSX').value,
            soLuong: document.getElementById('soLuong').value,
            giaBan: document.getElementById('giaBan').value
        };

        fetch('/api/thuoc', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(thuocMoi)
        }).then(() => {
            // Bảng thông báo xịn xò
            Swal.fire({
                title: 'Thành công!',
                text: 'Đã nhập thuốc vào kho dữ liệu.',
                icon: 'success',
                confirmButtonColor: '#4318FF'
            });
            this.reset();
            taiLaiDanhSach();
        });
    });

    function timKiemThuoc() {
        const tuKhoa = document.getElementById('inputSearch').value;
        fetch(`/api/thuoc/search?q=${tuKhoa}`).then(res => res.json()).then(data => {
            hienThiBang(data);
            if(data.length === 0) {
                Swal.fire({ icon: 'error', title: 'Rỗng', text: 'Không tìm thấy kết quả nào!', confirmButtonColor: '#4318FF' });
            }
        });
    }

    function sapXepGia() {
        fetch('/api/thuoc/sort').then(res => res.json()).then(data => hienThiBang(data));
    }

    window.onload = taiLaiDanhSach;
</script>
</body>
</html>
