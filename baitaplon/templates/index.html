<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Thuốc Chuyên Nghiệp</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Biến màu sắc chuẩn hệ thống */
        :root {
            --primary-color: #4361ee;
            --primary-hover: #3a53d0;
            --success-color: #10b981;
            --success-hover: #059669;
            --warning-color: #f59e0b;
            --warning-hover: #d97706;
            --bg-color: #f4f7fe;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body { 
            background-color: var(--bg-color); 
            font-family: 'Inter', sans-serif; 
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* Tiêu đề chính */
        .page-title {
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -0.5px;
            position: relative;
            display: inline-block;
            margin-bottom: 2rem;
        }
        .page-title::after {
            content: "";
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: var(--primary-color);
            border-radius: 4px;
        }

        /* Kiến trúc Card (Khối giao diện) */
        .custom-card { 
            background: var(--card-bg);
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03); 
            border: 1px solid rgba(226, 232, 240, 0.6);
            padding: 24px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            height: 100%;
        }
        .custom-card:hover {
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.06);
        }

        .card-header-title {
            font-weight: 600;
            color: var(--text-main);
            font-size: 1.15rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Form Controls */
        .form-label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .form-control {
            border-radius: 8px;
            border: 1px solid var(--border-color);
            padding: 10px 14px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            box-shadow: none !important;
        }
        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.15) !important;
        }

        /* Nút bấm (Buttons) */
        .btn-custom {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
        }
        .btn-custom:active {
            transform: scale(0.97);
        }
        .btn-primary-custom {
            background-color: var(--primary-color);
            color: white;
        }
        .btn-primary-custom:hover { background-color: var(--primary-hover); color: white; }
        
        .btn-success-custom {
            background-color: var(--success-color);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }
        .btn-success-custom:hover { background-color: var(--success-hover); color: white; box-shadow: 0 6px 15px rgba(16, 185, 129, 0.3); }

        .btn-warning-custom {
            background-color: var(--warning-color);
            color: white;
        }
        .btn-warning-custom:hover { background-color: var(--warning-hover); color: white; }

        /* Bảng dữ liệu (Data Table) */
        .table-wrapper {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .table {
            margin-bottom: 0;
            font-size: 0.95rem;
        }
        .table thead th {
            background-color: #f8fafc;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            padding: 16px;
            border-bottom: 2px solid var(--border-color);
        }
        .table tbody td {
            padding: 16px;
            vertical-align: middle;
            border-bottom: 1px solid var(--border-color);
            color: #334155;
        }
        .table tbody tr {
            transition: background-color 0.2s ease;
        }
        .table tbody tr:hover {
            background-color: #f1f5f9;
        }
        .badge-price {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .fw-semibold { font-weight: 600; color: var(--text-main); }
        
        /* Search Bar */
        .search-wrapper .input-group-text {
            background: transparent;
            border-right: none;
            color: var(--text-muted);
        }
        .search-wrapper .form-control {
            border-left: none;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="text-center">
        <h2 class="page-title">Hệ Thống Quản Lý Kho Thuốc</h2>
    </div>

    <div class="row g-4 mt-2">
        <div class="col-xl-4 col-lg-5">
            <div class="custom-card">
                <div class="card-header-title">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-success"><path d="M12 20v-8m0 0V4m0 8h8m-8 0H4"/></svg>
                    Thêm Thuốc Mới
                </div>
                <form id="formThuoc">
                    <div class="mb-3">
                        <label class="form-label">Mã thuốc</label>
                        <input type="text" id="maThuoc" class="form-control" placeholder="VD: T001" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tên thuốc</label>
                        <input type="text" id="tenThuoc" class="form-control" placeholder="VD: Paracetamol" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nhà sản xuất</label>
                        <input type="text" id="nhaSX" class="form-control" placeholder="VD: Dược Hậu Giang" required>
                    </div>
                    <div class="row mb-4">
                        <div class="col-6">
                            <label class="form-label">Số lượng</label>
                            <input type="number" id="soLuong" class="form-control" placeholder="0" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label">Giá bán (VNĐ)</label>
                            <input type="number" id="giaBan" class="form-control" placeholder="0" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-custom btn-success-custom w-100 mt-2">Lưu Vào Kho</button>
                </form>
            </div>
        </div>

        <div class="col-xl-8 col-lg-7">
            <div class="custom-card">
                <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
                    <div class="input-group search-wrapper" style="max-width: 350px;">
                        <span class="input-group-text bg-white border-color">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        </span>
                        <input type="text" id="inputSearch" class="form-control border-color" placeholder="Tìm kiếm tên thuốc...">
                        <button class="btn btn-primary btn-custom btn-primary-custom" onclick="timKiemThuoc()" type="button">Tìm</button>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button class="btn-custom btn-warning-custom" onclick="sapXepGia()">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="me-1"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>
                            Giá Tăng Dần
                        </button>
                        <button class="btn-custom btn-light border" onclick="taiLaiDanhSach()" style="background: white;">
                            Làm mới
                        </button>
                    </div>
                </div>

                <div class="table-responsive table-wrapper">
                    <table class="table table-hover text-center align-middle">
                        <thead>
                            <tr>
                                <th width="12%">Mã</th>
                                <th width="30%" class="text-start">Tên Thuốc</th>
                                <th width="23%">Nhà Sản Xuất</th>
                                <th width="10%">SL</th>
                                <th width="25%">Giá Bán</th>
                            </tr>
                        </thead>
                        <tbody id="bangThuoc">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Hàm hiển thị bảng (Đã cập nhật class CSS)
    function hienThiBang(danhSach) {
        const tbody = document.getElementById('bangThuoc');
        tbody.innerHTML = '';
        danhSach.forEach(thuoc => {
            const tr = `<tr>
                <td><span class="fw-semibold text-primary">#${thuoc.maThuoc}</span></td>
                <td class="text-start fw-semibold">${thuoc.tenThuoc}</td>
                <td class="text-muted">${thuoc.nhaSX}</td>
                <td><strong>${thuoc.soLuong}</strong></td>
                <td><span class="badge-price">${thuoc.giaBan.toLocaleString('vi-VN')} đ</span></td>
            </tr>`;
            tbody.innerHTML += tr;
        });
    }

    // 1. Lấy danh sách
    function taiLaiDanhSach() {
        fetch('/api/thuoc')
            .then(res => res.json())
            .then(data => hienThiBang(data));
        document.getElementById('inputSearch').value = '';
    }

    // 2. Thêm thuốc
    document.getElementById('formThuoc').addEventListener('submit', function(e) {
        e.preventDefault();
        const thuocMoi = {
            maThuoc: document.getElementById('maThuoc').value,
            tenThuoc: document.getElementById('tenThuoc').value,
            nhaSX: document.getElementById('nhaSX').value,
            soLuong: document.getElementById('soLuong').value,
            giaBan: document.getElementById('giaBan').value
        };

        fetch('/api/thuoc', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(thuocMoi)
        }).then(() => {
            alert('Thêm thuốc vào kho thành công!');
            this.reset();
            taiLaiDanhSach();
        });
    });

    // 3. Tìm kiếm
    function timKiemThuoc() {
        const tuKhoa = document.getElementById('inputSearch').value;
        fetch(`/api/thuoc/search?q=${tuKhoa}`)
            .then(res => res.json())
            .then(data => {
                hienThiBang(data);
                if(data.length === 0) alert("Không tìm thấy thuốc khớp với từ khóa!");
            });
    }

    // 4. Sắp xếp
    function sapXepGia() {
        fetch('/api/thuoc/sort')
            .then(res => res.json())
            .then(data => hienThiBang(data));
    }

    window.onload = taiLaiDanhSach;
</script>
</body>
</html>
